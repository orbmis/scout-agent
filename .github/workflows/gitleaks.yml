name: gitleaks

# Scan on push (covers every commit on every branch, including PR branches in this
# repo). The pull_request event is intentionally omitted: gitleaks-action tries to
# post PR comments there, which needs elevated permissions we don't want to grant.
on:
  push:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the scan covers all commits
      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
